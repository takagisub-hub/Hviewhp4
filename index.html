<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hview | Content. Commerce. Growth.</title>
  <style>
    :root {
      --pink: #f34f72;
      --pink-dark: #e23e63;
      --pink-soft: #fff1f4;
      --ink: #292629;
      --muted: #777075;
      --white: #ffffff;
      --card-radius: 26px;
      --shadow: 0 18px 55px rgba(171, 80, 102, 0.15);
      --card-width: min(1040px, 72vw);
      --card-height: clamp(390px, 36vw, 570px);
      --gap: 28px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family:
        Inter, "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN",
        "Yu Gothic", Meiryo, sans-serif;
      background:
        radial-gradient(circle at 50% 32%, rgba(255,255,255,.9), transparent 34%),
        linear-gradient(180deg, #fff7f8 0%, #ffeef2 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    button,
    a {
      font: inherit;
    }

    .site-header {
      width: min(1540px, calc(100% - 56px));
      height: 94px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 180px 1fr 210px;
      align-items: center;
      gap: 24px;
    }

    .brand {
      color: var(--pink);
      font-size: 2.05rem;
      font-weight: 850;
      letter-spacing: -0.08em;
      text-decoration: none;
    }

    .global-nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: clamp(18px, 2.4vw, 44px);
      flex-wrap: wrap;
    }

    .global-nav a {
      color: var(--pink-dark);
      font-size: 0.78rem;
      font-weight: 750;
      letter-spacing: 0.025em;
      text-decoration: none;
      white-space: nowrap;
      transition: opacity .2s ease;
    }

    .global-nav a:hover {
      opacity: .58;
    }

    .header-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 14px;
    }

    .connect-button {
      border: 1px solid rgba(243, 79, 114, .5);
      background: rgba(255,255,255,.78);
      color: var(--pink);
      text-decoration: none;
      font-size: .75rem;
      font-weight: 800;
      padding: 13px 20px;
      border-radius: 999px;
      backdrop-filter: blur(8px);
    }

    .menu-button {
      width: 46px;
      height: 46px;
      border: 0;
      border-radius: 50%;
      color: white;
      background: var(--pink);
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .menu-lines,
    .menu-lines::before,
    .menu-lines::after {
      width: 18px;
      height: 2px;
      background: white;
      border-radius: 999px;
      display: block;
      content: "";
    }

    .menu-lines {
      position: relative;
    }

    .menu-lines::before {
      position: absolute;
      top: -6px;
    }

    .menu-lines::after {
      position: absolute;
      top: 6px;
    }

    .hero {
      padding: 24px 0 64px;
    }

    .hero-heading {
      text-align: center;
      padding: 0 24px 28px;
    }

    .hero-heading h1 {
      margin: 0;
      color: var(--pink);
      font-size: clamp(6rem, 12vw, 12rem);
      line-height: .78;
      font-weight: 880;
      letter-spacing: -0.095em;
    }

    .hero-heading p {
      margin: 28px 0 0;
      color: var(--pink);
      font-size: clamp(1rem, 1.4vw, 1.42rem);
      letter-spacing: -0.025em;
    }

    .carousel-shell {
      width: min(1510px, calc(100% - 36px));
      margin: 0 auto;
      position: relative;
    }

    .carousel-viewport {
      overflow: hidden;
      border-radius: calc(var(--card-radius) + 6px);
      padding: 10px 0 18px;
      cursor: grab;
      touch-action: pan-y;
    }

    .carousel-viewport.is-dragging {
      cursor: grabbing;
    }

    .carousel-track {
      display: flex;
      gap: var(--gap);
      will-change: transform;
      transition: transform .72s cubic-bezier(.2,.75,.2,1);
      padding-left: max(18px, calc((100vw - min(1510px, calc(100vw - 36px))) / 2));
    }

    .carousel-track.no-transition {
      transition: none;
    }

    .slide {
      flex: 0 0 var(--card-width);
      height: var(--card-height);
      border-radius: var(--card-radius);
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #ef879e, #bd4c67);
      box-shadow: var(--shadow);
      isolation: isolate;
    }

    .slide::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(90deg, rgba(16,13,14,.58) 0%, rgba(16,13,14,.17) 46%, transparent 75%),
        var(--slide-image, linear-gradient(135deg, #ed93a7, #c55370));
      background-size: cover;
      background-position: var(--slide-position, center);
      transform: scale(1.015);
      transition: transform 1.1s ease;
      z-index: -2;
    }

    .slide:hover::before {
      transform: scale(1.045);
    }

    .slide::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 40%, rgba(10,8,9,.22));
      z-index: -1;
    }

    .slide-content {
      height: 100%;
      padding: clamp(34px, 4.4vw, 72px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      color: white;
      max-width: 490px;
    }

    .slide-number {
      font-size: .88rem;
      font-weight: 650;
      margin-bottom: 14px;
      opacity: .92;
    }

    .slide h2 {
      margin: 0;
      font-size: clamp(3.35rem, 5.5vw, 6rem);
      line-height: .92;
      letter-spacing: -0.065em;
      font-weight: 900;
      text-transform: uppercase;
    }

    .slide-description {
      margin: 20px 0 26px;
      max-width: 310px;
      font-size: clamp(.92rem, 1.15vw, 1.12rem);
      line-height: 1.5;
      font-weight: 520;
      text-shadow: 0 2px 18px rgba(0,0,0,.2);
    }

    .slide-cta {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      border: 0;
      border-radius: 999px;
      padding: 15px 22px;
      background: var(--pink);
      color: white;
      text-decoration: none;
      font-size: .82rem;
      font-weight: 850;
      letter-spacing: .03em;
      box-shadow: 0 10px 26px rgba(179, 36, 70, .25);
    }

    .slide-cta span:last-child {
      width: 22px;
      height: 22px;
      border: 1px solid rgba(255,255,255,.65);
      border-radius: 50%;
      display: grid;
      place-items: center;
    }

    .carousel-button {
      position: absolute;
      top: calc(var(--card-height) / 2 - 26px);
      z-index: 6;
      width: 56px;
      height: 56px;
      border: 0;
      border-radius: 50%;
      background: white;
      color: var(--pink);
      box-shadow: 0 10px 28px rgba(160, 62, 84, .15);
      font-size: 1.6rem;
      cursor: pointer;
      transition: transform .2s ease, opacity .2s ease;
    }

    .carousel-button:hover {
      transform: scale(1.06);
    }

    .carousel-button:disabled {
      opacity: .35;
      cursor: default;
      transform: none;
    }

    .carousel-button.prev {
      left: 2px;
    }

    .carousel-button.next {
      right: 2px;
    }

    .category-nav {
      width: min(920px, calc(100% - 40px));
      margin: 22px auto 0;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      align-items: start;
    }

    .category-button {
      border: 0;
      background: transparent;
      cursor: pointer;
      color: #524c50;
      padding: 0 4px 13px;
      position: relative;
    }

    .category-mark {
      width: 58px;
      height: 58px;
      margin: 0 auto 12px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,.9);
      color: var(--pink);
      font-size: .72rem;
      font-weight: 900;
      letter-spacing: -.02em;
      box-shadow: 0 8px 25px rgba(174, 71, 95, .08);
    }

    .category-label {
      font-size: clamp(.67rem, 1vw, .86rem);
      font-weight: 750;
      line-height: 1.25;
    }

    .category-button::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 0;
      height: 3px;
      border-radius: 999px;
      background: var(--pink);
      transform: translateX(-50%);
      transition: width .28s ease;
    }

    .category-button.is-active {
      color: var(--pink);
    }

    .category-button.is-active::after {
      width: 68px;
    }

    .hint {
      text-align: center;
      color: #998c91;
      font-size: .74rem;
      margin: 20px 0 0;
    }

    @media (max-width: 1080px) {
      :root {
        --card-width: 82vw;
        --card-height: clamp(390px, 52vw, 540px);
      }

      .site-header {
        grid-template-columns: 140px 1fr 58px;
      }

      .global-nav {
        gap: 18px;
      }

      .global-nav a:nth-last-child(-n+2),
      .connect-button {
        display: none;
      }

      .header-actions {
        justify-content: flex-end;
      }
    }

    @media (max-width: 720px) {
      :root {
        --card-width: 86vw;
        --card-height: 470px;
        --gap: 16px;
        --card-radius: 22px;
      }

      .site-header {
        width: calc(100% - 30px);
        height: 76px;
        grid-template-columns: 1fr auto;
      }

      .global-nav {
        display: none;
      }

      .brand {
        font-size: 1.8rem;
      }

      .hero {
        padding-top: 18px;
      }

      .hero-heading {
        padding-bottom: 18px;
      }

      .hero-heading h1 {
        font-size: clamp(5.2rem, 25vw, 8rem);
      }

      .hero-heading p {
        margin-top: 22px;
        font-size: .95rem;
      }

      .carousel-shell {
        width: 100%;
      }

      .carousel-track {
        padding-left: 7vw;
      }

      .slide-content {
        padding: 34px 28px;
        justify-content: flex-end;
      }

      .slide h2 {
        font-size: 3.45rem;
      }

      .slide-description {
        margin: 14px 0 20px;
      }

      .carousel-button {
        display: none;
      }

      .category-nav {
        overflow-x: auto;
        display: flex;
        width: calc(100% - 18px);
        padding: 0 4px 7px;
        scrollbar-width: none;
      }

      .category-nav::-webkit-scrollbar {
        display: none;
      }

      .category-button {
        flex: 0 0 108px;
      }

      .category-mark {
        width: 52px;
        height: 52px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a href="#" class="brand" aria-label="Hview home">Hview</a>

    <nav class="global-nav" aria-label="メインナビゲーション">
      <a href="#food">FOOD</a>
      <a href="#fitness">FITNESS</a>
      <a href="#beauty">BEAUTY</a>
      <a href="#ec">EC / D2C</a>
      <a href="#marketing">MARKETING &amp; CONSULTING</a>
      <a href="#about">ABOUT</a>
      <a href="#contact">CONTACT</a>

      <button class="menu-button" type="button" aria-label="メニューを開く">

    </section>

    <nav class="category-nav" id="categoryNav" aria-label="事業を選択"></nav>
    <p class="hint">横にスワイプ・ドラッグして切り替えられます</p>
  </main>

      {

        image: "",

      },
      {
        id: "beauty",
        number: "03 / 05",
        short: "BE",
        title: "BEAUTY",
        description: "自分らしい美しさを、もっと身近に。",
        image: "",
        position: "center",
        fallback: "linear-gradient(135deg, #f2a7b7, #a25a7c)",
        href: "#beauty"
      },
      {
        id: "ec",
        number: "04 / 05",
        short: "EC",
        title: "EC / D2C",
        description: "愛される商品とブランドを育てる。",
        image: "",
        position: "center",
        fallback: "linear-gradient(135deg, #f0a772, #c04f68)",
        href: "#ec"
      },
      {
        id: "marketing",
        number: "05 / 05",
        short: "MKT",
        title: "MARKETING",
        description: "アイデアを、成果につながる仕組みへ。",
        image: "",
        position: "center",
        fallback: "linear-gradient(135deg, #f08a97, #6e607f)",
        href: "#marketing"
      }
    ];

    const track = document.getElementById("carouselTrack");
    const categoryNav = document.getElementById("categoryNav");
    const viewport = document.querySelector(".carousel-viewport");
    const prevButton = document.querySelector(".carousel-button.prev");
    const nextButton = document.querySelector(".carousel-button.next");

    let currentIndex = 0;
    let dragStartX = 0;
    let dragCurrentX = 0;
    let isDragging = false;

    function cssBackground(slide) {
      return slide.image
        ? `url("${slide.image}")`
        : slide.fallback;
    }

    function renderSlides() {
      track.innerHTML = SLIDES.map((slide) => `
        <article
          class="slide"
          id="${slide.id}"
          style="--slide-image:${cssBackground(slide)}; --slide-position:${slide.position};"
          aria-label="${slide.title}"
        >
          <div class="slide-content">
            <div class="slide-number">${slide.number}</div>
            <h2>${slide.title}</h2>
            <p class="slide-description">${slide.description}</p>
            <a class="slide-cta" href="${slide.href}">
              <span>EXPLORE</span><span aria-hidden="true">›</span>
            </a>
          </div>
        </article>
      `).join("");

      categoryNav.innerHTML = SLIDES.map((slide, index) => `
        <button
          class="category-button ${index === 0 ? "is-active" : ""}"
          type="button"
          data-index="${index}"
          aria-label="${slide.title}を表示"
        >
          <span class="category-mark">${slide.short}</span>
          <span class="category-label">${slide.title}</span>
        </button>
      `).join("");
    }

    function cardMetrics() {
      const firstCard = track.querySelector(".slide");
      if (!firstCard) return { width: 0, gap: 0 };

      const cardWidth = firstCard.getBoundingClientRect().width;
      const styles = getComputedStyle(track);
      const gap = parseFloat(styles.columnGap || styles.gap) || 0;
      return { width: cardWidth, gap };
    }

    function goTo(index, animate = true) {
      currentIndex = Math.max(0, Math.min(index, SLIDES.length - 1));

      const { width, gap } = cardMetrics();
      track.classList.toggle("no-transition", !animate);
      track.style.transform = `translate3d(-${currentIndex * (width + gap)}px, 0, 0)`;

      document.querySelectorAll(".category-button").forEach((button, i) => {
        button.classList.toggle("is-active", i === currentIndex);
        button.setAttribute("aria-current", i === currentIndex ? "true" : "false");
      });

      prevButton.disabled = currentIndex === 0;
      nextButton.disabled = currentIndex === SLIDES.length - 1;

      requestAnimationFrame(() => {
        if (!animate) {
          requestAnimationFrame(() => track.classList.remove("no-transition"));
        }
      });
    }

    prevButton.addEventListener("click", () => goTo(currentIndex - 1));
    nextButton.addEventListener("click", () => goTo(currentIndex + 1));

    categoryNav.addEventListener("click", (event) => {
      const button = event.target.closest(".category-button");
      if (!button) return;
      goTo(Number(button.dataset.index));
    });

    viewport.addEventListener("pointerdown", (event) => {
      isDragging = true;
      dragStartX = event.clientX;
      dragCurrentX = event.clientX;
      viewport.classList.add("is-dragging");
      viewport.setPointerCapture(event.pointerId);
      track.classList.add("no-transition");
    });

    viewport.addEventListener("pointermove", (event) => {
      if (!isDragging) return;
      dragCurrentX = event.clientX;

      const { width, gap } = cardMetrics();
      const base = currentIndex * (width + gap);
      const delta = dragCurrentX - dragStartX;
      track.style.transform = `translate3d(${-base + delta}px, 0, 0)`;
    });

    function finishDrag() {
      if (!isDragging) return;
      isDragging = false;
      viewport.classList.remove("is-dragging");
      track.classList.remove("no-transition");

      const distance = dragCurrentX - dragStartX;
      const threshold = Math.min(140, window.innerWidth * 0.12);

      if (distance < -threshold) {
        goTo(currentIndex + 1);
      } else if (distance > threshold) {
        goTo(currentIndex - 1);
      } else {
        goTo(currentIndex);
      }
    }

    viewport.addEventListener("pointerup", finishDrag);
    viewport.addEventListener("pointercancel", finishDrag);
    viewport.addEventListener("lostpointercapture", finishDrag);

    window.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") goTo(currentIndex - 1);
      if (event.key === "ArrowRight") goTo(currentIndex + 1);
    });

    let resizeTimer;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => goTo(currentIndex, false), 100);
    });

    renderSlides();
    goTo(0, false);
  </script>
